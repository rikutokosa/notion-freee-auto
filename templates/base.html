<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Notion→freee 自動仕訳{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f6fa; color: #333; }
    .navbar {
      background: #1a1a2e; color: #fff; padding: 0 24px;
      display: flex; align-items: center; height: 56px; gap: 24px;
    }
    .navbar .brand { font-size: 18px; font-weight: bold; color: #7ec8e3; text-decoration: none; }
    .navbar a { color: #ccc; text-decoration: none; font-size: 14px; }
    .navbar a:hover { color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .card {
      background: #fff; border-radius: 10px; padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; font-weight: bold; margin-bottom: 14px; color: #1a1a2e; border-left: 4px solid #7ec8e3; padding-left: 10px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .badge-ok { background: #d4edda; color: #155724; }
    .badge-error { background: #f8d7da; color: #721c24; }
    .badge-skip { background: #d1ecf1; color: #0c5460; }
    .badge-review { background: #fff3cd; color: #856404; }
    .badge-green { background: #28a745; color: #fff; }
    .badge-red { background: #dc3545; color: #fff; }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 6px;
      font-size: 14px; font-weight: bold; cursor: pointer; border: none;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f0f4f8; padding: 8px 10px; text-align: left; font-weight: bold; color: #555; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:hover td { background: #fafbff; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .dot-green { background: #28a745; }
    .dot-red { background: #dc3545; }
    .dot-gray { background: #aaa; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #28a745; }
    .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #dc3545; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/">⚡ Notion→freee</a>
    <a href="/">ダッシュボード</a>
    <a href="/preview">仕訳プレビュー</a>
    <a href="/chat">チャット指示</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
