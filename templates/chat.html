{% extends "base.html" %}
{% block title %}チャット指示 - Notion→freee{% endblock %}
{% block content %}

<h1 style="font-size:22px; font-weight:bold; margin-bottom:20px;">チャット指示</h1>

<div class="card">
  <h2>自然言語でシステムに指示する</h2>
  <p style="font-size:13px; color:#666; margin-bottom:16px;">
    「今すぐ処理して」「何件ある？」「ログ見せて」などと入力してください。
  </p>

  <div id="chat-messages" style="
    background:#f8f9fa; border-radius:8px; padding:16px;
    height:400px; overflow-y:auto; margin-bottom:16px;
    font-size:14px; line-height:1.7;
  ">
    <div class="msg-system">
      👋 こんにちは！Notion→freee 自動仕訳システムです。<br>
      「今すぐ処理して」「状態確認」「ログ見せて」などと入力してください。
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <input
      id="chat-input"
      type="text"
      placeholder="例：今すぐ処理して / 何件ある？ / ログ見せて"
      style="flex:1; padding:10px 14px; border:1px solid #ddd; border-radius:6px; font-size:14px;"
      onkeydown="if(event.key==='Enter') sendMessage()"
    >
    <button class="btn btn-primary" onclick="sendMessage()">送信</button>
  </div>

  <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
    <button class="btn btn-secondary" style="font-size:12px; padding:5px 12px;" onclick="quickSend('今すぐ処理して')">▶ 今すぐ処理</button>
    <button class="btn btn-secondary" style="font-size:12px; padding:5px 12px;" onclick="quickSend('何件ある？')">📊 件数確認</button>
    <button class="btn btn-secondary" style="font-size:12px; padding:5px 12px;" onclick="quickSend('ログ見せて')">📋 ログ確認</button>

  </div>
</div>

<style>
.msg-user { background:#4a90d9; color:#fff; border-radius:12px 12px 4px 12px; padding:8px 14px; margin:6px 0 6px 60px; }
.msg-bot { background:#fff; border:1px solid #e0e0e0; border-radius:12px 12px 12px 4px; padding:8px 14px; margin:6px 60px 6px 0; white-space:pre-wrap; }
.msg-system { color:#888; font-size:13px; margin-bottom:8px; }
</style>

{% endblock %}

{% block scripts %}
<script>
const chatBox = document.getElementById('chat-messages');

function appendMessage(text, type) {
  const div = document.createElement('div');
  div.className = type === 'user' ? 'msg-user' : 'msg-bot';
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  appendMessage(msg, 'user');

  const thinking = document.createElement('div');
  thinking.className = 'msg-bot';
  thinking.textContent = '処理中...';
  chatBox.appendChild(thinking);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg}),
    });
    const data = await r.json();
    thinking.textContent = data.reply || '（応答なし）';
  } catch(e) {
    thinking.textContent = 'エラー: ' + e.message;
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}


</script>
{% endblock %}
