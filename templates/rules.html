{% extends "base.html" %}
{% block title %}ルールブック{% endblock %}

{% block content %}
<style>
  .rules-tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .rules-tab-btn {
    padding:8px 20px; border:2px solid #e2e8f0; border-radius:8px;
    background:#fff; cursor:pointer; font-size:14px; font-weight:600;
    color:#64748b; transition:all .2s;
  }
  .rules-tab-btn.active {
    background:#3b82f6; color:#fff; border-color:#3b82f6;
  }
  .rules-section { display:none; }
  .rules-section.active { display:block; }

  /* テーブル共通 */
  .rules-table { width:100%; border-collapse:collapse; font-size:14px; }
  .rules-table th {
    background:#f1f5f9; padding:10px 14px; text-align:left;
    border-bottom:2px solid #e2e8f0; font-weight:700; color:#475569;
  }
  .rules-table td {
    padding:10px 14px; border-bottom:1px solid #f1f5f9; vertical-align:top;
  }
  .rules-table tr:hover td { background:#f8fafc; }

  /* バッジ */
  .badge-type {
    display:inline-block; padding:2px 8px; border-radius:12px;
    font-size:11px; font-weight:700;
  }
  .badge-求人DB { background:#dbeafe; color:#1d4ed8; }
  .badge-集客   { background:#dcfce7; color:#15803d; }
  .badge-パートナー { background:#fef3c7; color:#b45309; }
  .badge-invoice { background:#fce7f3; color:#be185d; }
  .badge-journal { background:#ede9fe; color:#7c3aed; }
  .badge-warn    { background:#fff7ed; color:#c2410c; }
  .badge-ok      { background:#f0fdf4; color:#15803d; }
  .badge-info    { background:#eff6ff; color:#1d4ed8; }

  /* NO.バッジ */
  .rule-no {
    display:inline-block; min-width:32px; padding:2px 7px;
    background:#1e293b; color:#fff; border-radius:6px;
    font-size:11px; font-weight:700; text-align:center;
  }
  .rule-no-legacy {
    display:inline-block; min-width:32px; padding:2px 7px;
    background:#94a3b8; color:#fff; border-radius:6px;
    font-size:11px; font-weight:700; text-align:center;
  }
  .added-date { font-size:11px; color:#94a3b8; white-space:nowrap; }

  /* 機能ルールカード */
  .func-rule-card {
    border:1px solid #e2e8f0; border-radius:12px; margin-bottom:24px;
    overflow:hidden;
  }
  .func-rule-card-header {
    background:#f8fafc; padding:14px 20px;
    border-bottom:1px solid #e2e8f0;
    display:flex; align-items:center; gap:12px;
  }
  .func-rule-card-header h3 { margin:0; font-size:16px; color:#1e293b; }
  .func-rule-card-body { padding:20px; }

  /* 変更履歴 */
  .history-table { width:100%; border-collapse:collapse; font-size:13px; }
  .history-table th {
    background:#f1f5f9; padding:8px 14px; text-align:left;
    border-bottom:2px solid #e2e8f0; color:#475569; font-weight:700;
  }
  .history-table td { padding:8px 14px; border-bottom:1px solid #f1f5f9; }
  .history-table tr:hover td { background:#f8fafc; }
  .history-date { color:#3b82f6; font-weight:600; white-space:nowrap; }

  /* インフォボックス */
  .info-box {
    padding:14px 18px; border-radius:10px; margin-top:16px;
  }
  .info-box.green  { background:#f0fdf4; border:1px solid #bbf7d0; }
  .info-box.blue   { background:#eff6ff; border:1px solid #bfdbfe; }
  .info-box.yellow { background:#fffbeb; border:1px solid #fde68a; }
  .info-box.red    { background:#fff1f2; border:1px solid #fecdd3; }
  .info-box p { margin:6px 0 0; font-size:13px; line-height:1.7; }
</style>

<div class="card">
  <h2 style="margin:0 0 6px;">📖 ルールブック</h2>
  <p style="color:#64748b;margin:0 0 20px;font-size:14px;">
    各機能の運用ルール・集客経路ごとの仕訳ルールをまとめています。変更履歴はナビバーの「変更履歴」から確認できます。
  </p>

  <div class="rules-tabs">
    <button class="rules-tab-btn active" onclick="showTab('tab-jidou', this)">🔄 自動転記</button>
    <button class="rules-tab-btn" onclick="showTab('tab-seikyu', this)">📄 請求書登録</button>
    <button class="rules-tab-btn" onclick="showTab('tab-shocho', this)">🧾 請求書照合</button>
    <button class="rules-tab-btn" onclick="showTab('tab-shiharai', this)">🏦 総合振込データ作成</button>
    <button class="rules-tab-btn" onclick="showTab('tab-assistant', this)">🤖 仕訳アシスタント</button>
    <button class="rules-tab-btn" onclick="showTab('tab-keiro', this)">📋 集客経路ルール</button>
    <button class="rules-tab-btn" onclick="showTab('tab-system', this)">⚙️ システム概要</button>
  </div>


  {% include 'rules_tabs.html' %}

</div>
{% endblock %}

{% block scripts %}
<script>
function showTab(id, btn) {
  document.querySelectorAll('.rules-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.rules-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  location.hash = id;
}

// URLハッシュがあれば対応タブを開く
document.addEventListener('DOMContentLoaded', function() {
  const hash = location.hash.replace('#', '');
  if (hash) {
    const target = document.getElementById(hash);
    if (target) {
      document.querySelectorAll('.rules-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.rules-tab-btn').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      // 対応するボタンをアクティブに
      document.querySelectorAll('.rules-tab-btn').forEach(b => {
        if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(hash)) {
          b.classList.add('active');
        }
      });
    }
  }
});
</script>
{% endblock %}
